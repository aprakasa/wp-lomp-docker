services:
  openlitespeed:
    image: ghcr.io/aprakasa/ols:8.3
    container_name: ${COMPOSE_PROJECT_NAME:-wp}-ols
    entrypoint: ["/bin/bash", "/usr/local/bin/wp-entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "127.0.0.1:7080:7080"
    volumes:
      - ./scripts/entrypoint.sh:/usr/local/bin/wp-entrypoint.sh:ro
      - ./wordpress:/var/www/vhosts/localhost/html
      - ./ols/httpd.conf:/usr/local/lsws/conf/httpd_config.conf
      - ./ols/vhost.conf:/usr/local/lsws/conf/vhosts/localhost/vhconf.conf:ro
      - ./ols/php.ini:/usr/local/lsws/lsphp83/etc/php/8.3/litespeed/php.ini:ro
      - ./ssl:/usr/local/lsws/conf/vhosts/localhost/ssl
      - ./logs:/usr/local/lsws/logs
      - ols_admin:/usr/local/lsws/admin
      - ols_tmp:/tmp/lshttpd
      - redis_socket:/var/run/redis
      - mariadb_socket:/var/run/mysqld
      - certbot_webroot:/var/www/certbot
    environment:
      TZ: ${TZ:-UTC}
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL:-}
      OLS_WORKERS: ${OLS_WORKERS:-4}
      SSL: ${SSL:-0}
      SSL_STAGING: ${SSL_STAGING:-0}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_SITE_TITLE: ${WP_SITE_TITLE:-WordPress}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  mariadb:
    image: mariadb:12
    container_name: ${COMPOSE_PROJECT_NAME:-wp}-mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - mariadb_socket:/var/run/mysqld
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wp}-redis
    volumes:
      - redis_data:/data
      - redis_socket:/var/run/redis
    command: >
      sh -c "mkdir -p /var/run/redis && chown redis:redis /var/run/redis && redis-server
      --maxmemory ${REDIS_MAXMEMORY:-64mb}
      --maxmemory-policy allkeys-lru
      --save 60 1
      --unixsocket /var/run/redis/redis.sock
      --unixsocketperm 770"
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/var/run/redis/redis.sock", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  acme-sh:
    image: neilpang/acme.sh
    container_name: ${COMPOSE_PROJECT_NAME:-wp}-acme-sh
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ssl:/ssl
      - certbot_webroot:/webroot
      - acme_data:/acme.sh
      - ./acme-sh/entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      openlitespeed:
        condition: service_healthy
    environment:
      - DOMAIN=${DOMAIN}
      - EMAIL=${EMAIL:-}
      - SSL=${SSL:-0}
      - SSL_STAGING=${SSL_STAGING:-0}
      - OLS_CONTAINER=${COMPOSE_PROJECT_NAME:-wp}-ols
    entrypoint: ["/entrypoint.sh"]

volumes:
  mariadb_data:
  mariadb_socket:
  redis_data:
  redis_socket:
  ols_admin:
  ols_tmp:
  acme_data:
  certbot_webroot:

networks:
  default:
    driver: bridge
